name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: Core Crate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Check formatting
      run: cargo fmt --check
    - name: Clippy (Core)
      run: cargo clippy -p caml-core --all-targets -- -D warnings
    - name: Test Core
      run: cargo test -p caml-core

  facade:
    name: Facade Crate
    runs-on: ubuntu-latest
    needs: core
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Clippy (Facade)
      run: cargo clippy -p caml --all-targets -- -D warnings
    - name: Test Facade
      run: cargo test -p caml

  ffmpeg:
    name: FFmpeg Features
    runs-on: ubuntu-latest
    needs: core
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Install FFmpeg dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libavdevice-dev libavfilter-dev pkg-config
    - name: Clippy (FFmpeg)
      run: cargo clippy -p caml-ffmpeg --all-targets -- -D warnings
    - name: Test FFmpeg
      run: cargo test --features ffmpeg

  webrtc:
    name: WebRTC Features
    runs-on: ubuntu-latest
    needs: core
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Clippy (WebRTC)
      run: cargo clippy -p caml-webrtc --all-targets -- -D warnings
    - name: Test WebRTC
      run: cargo test --features webrtc

  pi:
    name: Pi Features
    runs-on: ubuntu-latest
    needs: core
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Install libcamera dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcamera-dev libclang-dev pkg-config
    - name: Clippy (Pi)
      run: cargo clippy -p caml-linux-media --all-targets -- -D warnings
    - name: Test Pi
      run: cargo test --features pi

  full:
    name: Full Feature Check
    runs-on: ubuntu-latest
    needs: [ffmpeg, webrtc, pi]
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install all dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libavdevice-dev libavfilter-dev libcamera-dev libclang-dev pkg-config
    - name: Check Full Features
      run: cargo check --features full
    - name: Clippy (All Workspace)
      run: cargo clippy --workspace --all-targets -- -D warnings
